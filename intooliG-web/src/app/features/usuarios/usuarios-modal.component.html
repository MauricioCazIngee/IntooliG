<div *ngIf="visible" class="modal fade show d-block" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ isEdit ? 'Editar usuario' : 'Nuevo usuario' }}</h5>
        <button type="button" class="close" aria-label="Close" [disabled]="saving" (click)="cancel()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label>Email *</label>
          <input class="form-control" [(ngModel)]="form.email" [disabled]="saving" />
        </div>

        <div class="form-group">
          <label>Nombre *</label>
          <input class="form-control" [(ngModel)]="form.nombre" [disabled]="saving" />
        </div>

        <div class="form-group">
          <label>Cliente (ID) *</label>
          <input type="number" class="form-control" min="1" [(ngModel)]="form.clienteId" [disabled]="saving" />
        </div>

        <div class="form-group">
          <label>Rol</label>
          <select class="form-control" [(ngModel)]="form.rol" [disabled]="saving">
            <option value="Admin">Admin</option>
            <option value="Usuario">Usuario</option>
          </select>
        </div>

        <div class="form-group" *ngIf="!isEdit">
          <label>Contraseña inicial *</label>
          <input type="password" class="form-control" [(ngModel)]="form.password" [disabled]="saving" />
        </div>

        <p *ngIf="error" class="text-danger mb-0">{{ error }}</p>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" [disabled]="saving" (click)="cancel()">Cancelar</button>
        <button type="button" class="btn btn-success btn-new" [disabled]="saving" (click)="submit()">
          {{ saving ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </div>
  </div>
</div>
<div *ngIf="visible" class="modal-backdrop fade show"></div>
