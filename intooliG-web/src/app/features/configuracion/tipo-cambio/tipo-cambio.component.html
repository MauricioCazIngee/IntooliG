<div class="container">
  <div class="card card-custom">
    <div class="card-header card-header-custom">
      <h4 style="margin: 0">Tipo de Cambio</h4>
    </div>
    <div class="card-body card-body-custom">
      <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
          <a class="nav-link active" href="javascript:void(0)">Tipo de Cambio Alta-Baja-Cambios</a>
        </li>
      </ul>

      <div class="toolbar row mb-2">
        <div class="col-md-2 mb-2">
          <label class="mb-0 small">Mostrar</label>
          <select class="form-control form-control-sm" [(ngModel)]="pageSize" (ngModelChange)="page = 1; loadRows()">
            <option [ngValue]="10">10</option>
            <option [ngValue]="25">25</option>
            <option [ngValue]="50">50</option>
          </select>
        </div>
        <div class="col-md-3 mb-2">
          <label class="mb-0 small">País</label>
          <select class="form-control form-control-sm" [(ngModel)]="paisId" (ngModelChange)="page = 1; loadRows()">
            <option [ngValue]="null">Todos</option>
            <option *ngFor="let p of paisesOptions" [ngValue]="p.id">{{ p.nombrePais }}</option>
          </select>
        </div>
        <div class="col-md-2 mb-2">
          <label class="mb-0 small">Año</label>
          <select class="form-control form-control-sm" [(ngModel)]="anio" (ngModelChange)="page = 1; loadRows()">
            <option [ngValue]="null">Todos</option>
            <option *ngFor="let y of aniosOptions" [ngValue]="y">{{ y }}</option>
          </select>
        </div>
        <div class="col-md-3 mb-2">
          <label class="mb-0 small">Buscar</label>
          <input class="form-control form-control-sm" [(ngModel)]="search" (keyup.enter)="page = 1; loadRows()" />
        </div>
        <div class="col-md-2 text-md-right mb-2" *ngIf="auth.isAdmin()">
          <button type="button" class="btn btn-success btn-sm btn-new mt-4" (click)="openNew()">Nuevo</button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered table-sm table-striped mb-0">
          <thead>
            <tr>
              <th>País</th>
              <th>Año</th>
              <th>Mes</th>
              <th>Tipo de Cambio</th>
              <th *ngIf="auth.isAdmin()">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let r of rows">
              <td>{{ r.paisNombre }}</td>
              <td>{{ r.anio }}</td>
              <td>{{ r.mesNombre }}</td>
              <td>{{ r.tipoCambio | number: '1.4-4' }}</td>
              <td *ngIf="auth.isAdmin()" class="actions">
                <button type="button" class="btn btn-default btn-sm btn-edit" (click)="openEdit(r)"><i class="fa fa-pencil"></i></button>
                <button type="button" class="btn btn-default btn-sm" (click)="askDelete(r)"><i class="fa fa-trash"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination-wrap" *ngIf="total > pageSize">
        <button type="button" class="btn btn-sm btn-light" [disabled]="page <= 1" (click)="page = page - 1; loadRows()">Anterior</button>
        <span class="small">Página {{ page }} / {{ pageNumbers(total, pageSize).length }}</span>
        <button type="button" class="btn btn-sm btn-light" [disabled]="page * pageSize >= total" (click)="page = page + 1; loadRows()">
          Siguiente
        </button>
      </div>
      <p *ngIf="loading" class="text-muted small mb-0">Cargando…</p>
    </div>
  </div>
</div>

<app-tipo-cambio-modal
  [visible]="showModal"
  [saving]="saving"
  [row]="editing"
  [paisesOptions]="paisesOptions"
  [aniosOptions]="aniosOptions"
  [mesesOptions]="mesesOptions"
  (close)="showModal = false"
  (save)="saveRow($event)"
/>

<app-confirm-dialog
  [visible]="showDelete"
  [loading]="deleting"
  title="Confirmar"
  [message]="'¿Eliminar el registro ' + deleteLabel + '?'"
  confirmText="Eliminar"
  cancelText="Cancelar"
  (confirm)="confirmDelete()"
  (cancel)="closeDelete()"
/>
